<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>深圳客户地图 · WorkBuddy GeoSales OS</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%230052D9'/><stop offset='1' stop-color='%237C3AED'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23g)'/><text x='50' y='66' text-anchor='middle' fill='white' font-size='42' font-weight='800' font-family='-apple-system'>W</text></svg>" />
  <style>
    .map-controls { position: absolute; top: 16px; left: 16px; z-index: 5; display: flex; flex-direction: column; gap: 8px; }
    .map-legend { position: absolute; bottom: 16px; right: 16px; z-index: 5; background: var(--color-surface-strong); backdrop-filter: blur(20px); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 14px 16px; font-size: 12px; min-width: 200px; }
    .map-legend-title { font-weight: 700; margin-bottom: 8px; font-size: 12px; }
    .map-legend-item { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
    .map-legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .map-side-panel { position: absolute; top: 16px; right: 16px; z-index: 5; background: var(--color-surface-strong); backdrop-filter: blur(20px); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 16px 18px; max-width: 280px; max-height: calc(100% - 32px); overflow-y: auto; }
    @media (max-width: 768px) { .map-side-panel { display: none; } }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-header">
        <div>
          <h1 class="page-title">深圳客户地图</h1>
          <p class="page-subtitle">8 个重点商区 · <span id="company-count">40</span> 家目标企业 · 实时筛选</p>
        </div>
        <div class="page-actions">
          <button class="btn-icon-theme mobile-menu-btn" id="mobile-menu-btn" title="菜单">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
          </button>
          <button class="btn-icon-theme" id="theme-btn" title="切换主题">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
          </button>
        </div>
      </div>

      <!-- 筛选条 -->
      <div class="filter-bar">
        <select class="form-control" id="filter-district">
          <option value="">全部商区</option>
        </select>
        <select class="form-control" id="filter-industry">
          <option value="">全部行业</option>
        </select>
        <select class="form-control" id="filter-level">
          <option value="">全部等级</option>
          <option value="A">A 类（80+）</option>
          <option value="B">B 类（60-79）</option>
          <option value="C">C 类（&lt;60）</option>
        </select>
        <select class="form-control" id="filter-stage">
          <option value="">全部阶段</option>
        </select>
        <input class="form-control search" id="filter-search" placeholder="🔍 搜索企业名称..." />
        <label class="flex items-center gap-2 text-sm cursor-pointer" style="padding: 0 8px;">
          <input type="checkbox" id="filter-a-only" />
          <span>仅显示 A 类</span>
        </label>
        <button class="btn btn-ghost btn-sm" id="reset-btn">重置</button>
      </div>

      <!-- 地图 + 侧栏 -->
      <div class="grid" style="grid-template-columns: 1.6fr 1fr; gap: 20px;">
        <div class="map-container" id="map-container">
          <svg class="map-svg" viewBox="0 0 680 600" preserveAspectRatio="xMidYMid meet" id="map-svg">
            <defs>
              <radialGradient id="districtGlow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#0052D9" stop-opacity="0.5"/>
                <stop offset="60%" stop-color="#0052D9" stop-opacity="0.2"/>
                <stop offset="100%" stop-color="#0052D9" stop-opacity="0"/>
              </radialGradient>
              <radialGradient id="districtGlowB" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.4"/>
                <stop offset="60%" stop-color="#7C3AED" stop-opacity="0.15"/>
                <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
              </radialGradient>
              <linearGradient id="seaGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#B6D6F0" stop-opacity="0.6"/>
                <stop offset="100%" stop-color="#D6E8F5" stop-opacity="0.4"/>
              </linearGradient>
              <filter id="dotGlow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="2" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>

            <!-- 深圳陆地轮廓（简化） -->
            <path id="shenzhen-outline"
              d="M 80 250 L 60 320 L 50 400 L 80 470 L 130 510 L 200 540 L 280 555 L 360 555 L 440 540 L 510 510 L 560 480 L 580 430 L 575 380 L 555 320 L 520 270 L 480 220 L 430 170 L 380 130 L 320 100 L 260 110 L 210 140 L 170 180 L 130 220 Z"
              fill="#F1F5F9" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4 4" opacity="0.5"
            />
            <text x="300" y="320" text-anchor="middle" font-size="32" font-weight="900" fill="#CBD5E1" opacity="0.5" font-family="-apple-system">深圳</text>

            <!-- 海域 -->
            <text x="200" y="540" text-anchor="middle" font-size="14" fill="#94A3B8" font-weight="600" letter-spacing="2">南 海</text>
            <text x="600" y="100" text-anchor="middle" font-size="12" fill="#94A3B8" font-weight="600" letter-spacing="2">大 鹏 湾</text>

            <!-- 商区 + 企业点位动态渲染到这里 -->
            <g id="districts-layer"></g>
            <g id="companies-layer"></g>
          </svg>

          <div class="map-controls">
            <div style="background: var(--color-surface-strong); backdrop-filter: blur(20px); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 10px 14px; font-size: 12px;">
              <div class="font-semibold mb-2">图例</div>
              <div class="flex items-center gap-2 mb-1"><span style="width: 10px; height: 10px; border-radius: 50%; background: linear-gradient(135deg, #FCD34D, #F59E0B);"></span>A 类高潜</div>
              <div class="flex items-center gap-2 mb-1"><span style="width: 10px; height: 10px; border-radius: 50%; background: linear-gradient(135deg, #93C5FD, #3B82F6);"></span>B 类培育</div>
              <div class="flex items-center gap-2"><span style="width: 10px; height: 10px; border-radius: 50%; background: #CBD5E1;"></span>C 类暂缓</div>
            </div>
          </div>
        </div>

        <!-- 侧边商区详情 -->
        <div>
          <div class="card" id="district-detail">
            <div class="flex items-center justify-between mb-4">
              <h3 class="text-lg font-bold">商区详情</h3>
              <span class="badge badge-info" id="detail-badge">全部</span>
            </div>
            <div id="detail-content">
              <div class="empty">
                <div class="empty-icon">📍</div>
                <div class="text-sm">点击地图上的商区</div>
                <div class="text-xs mt-2 text-muted">查看企业清单和优先级</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 商区列表（下方展示） -->
      <div class="card mt-6">
        <div class="flex items-center justify-between mb-4">
          <h3 class="flex items-center gap-3">
            <span style="width: 4px; height: 16px; background: var(--gradient-primary); border-radius: 4px;"></span>
            深圳 8 大重点商区
          </h3>
        </div>
        <div class="grid grid-4" id="districts-grid"></div>
      </div>
    </main>
  </div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    WB.initShell('map');

    // ---------- 坐标转换 ----------
    const LNG_MIN = 113.83, LNG_MAX = 114.12;
    const LAT_MIN = 22.42, LAT_MAX = 22.75;
    const SVG_W = 680, SVG_H = 600;
    function lngToX(lng) { return (lng - LNG_MIN) / (LNG_MAX - LNG_MIN) * SVG_W; }
    function latToY(lat) { return (LAT_MAX - lat) / (LAT_MAX - LAT_MIN) * SVG_H; }

    // ---------- 填充筛选下拉 ----------
    const districtSelect = document.getElementById('filter-district');
    WB.districts().forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.id; opt.textContent = d.name;
      districtSelect.appendChild(opt);
    });
    const industries = [...new Set(WB.companies().map(c => c.industry))].sort();
    const industrySelect = document.getElementById('filter-industry');
    industries.forEach(i => {
      const opt = document.createElement('option');
      opt.value = i; opt.textContent = i;
      industrySelect.appendChild(opt);
    });
    WB.STAGES.filter(s => s.id !== 'lost' && s.id !== 'paused').forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.id; opt.textContent = s.name;
      document.getElementById('filter-stage').appendChild(opt);
    });

    // ---------- 筛选条件 ----------
    let filters = {
      district: WB.urlParam('district') || '',
      industry: '', level: '', stage: '', search: '', aOnly: false
    };
    if (filters.district) districtSelect.value = filters.district;

    // ---------- 渲染地图 ----------
    function applyFilters() {
      const list = WB.companies().filter(c => {
        if (filters.district && c.districtId !== filters.district) return false;
        if (filters.industry && c.industry !== filters.industry) return false;
        if (filters.level && c.customerLevel !== filters.level) return false;
        if (filters.stage && c.currentStage !== filters.stage) return false;
        if (filters.search && !c.name.toLowerCase().includes(filters.search.toLowerCase()) && !c.industry.includes(filters.search)) return false;
        if (filters.aOnly && c.customerLevel !== 'A') return false;
        return true;
      });
      return list;
    }

    function renderMap() {
      const list = applyFilters();
      const districtLayer = document.getElementById('districts-layer');
      const companyLayer = document.getElementById('companies-layer');

      // 商区
      const maxHigh = Math.max(...WB.districts().map(d => d.highScoreCount));
      districtLayer.innerHTML = WB.districts().map(d => {
        const cx = lngToX(d.center[0]);
        const cy = latToY(d.center[1]);
        const r = 30 + (d.highScoreCount / maxHigh) * 30;
        const isActive = filters.district === d.id;
        return `
          <g class="district-hot" data-id="${d.id}" style="cursor: pointer;">
            <circle cx="${cx}" cy="${cy}" r="${r + 15}" fill="url(#districtGlowB)" opacity="0.6"/>
            <circle cx="${cx}" cy="${cy}" r="${r}" fill="${isActive ? '#0052D9' : '#7C3AED'}" fill-opacity="${isActive ? 0.5 : 0.25}" stroke="${isActive ? '#0052D9' : '#7C3AED'}" stroke-width="2"/>
            <circle cx="${cx}" cy="${cy}" r="4" fill="${isActive ? '#0052D9' : '#7C3AED'}"/>
            <text class="district-name" x="${cx}" y="${cy - r - 6}" text-anchor="middle">${d.name}</text>
            <text class="district-sub" x="${cx}" y="${cy - r + 6}" text-anchor="middle">A 类 ${d.highScoreCount} · 共 ${d.companyCount}</text>
          </g>
        `;
      }).join('');

      // 企业点位
      const colors = { A: 'url(#dotGold)', B: 'url(#dotBlue)', C: '#CBD5E1' };
      companyLayer.innerHTML = list.map(c => {
        const cx = lngToX(c.lng);
        const cy = latToY(c.lat);
        const r = c.customerLevel === 'A' ? 5 : c.customerLevel === 'B' ? 4 : 3;
        const fill = c.customerLevel === 'A' ? '#F59E0B' : c.customerLevel === 'B' ? '#3B82F6' : '#94A3B8';
        return `
          <g class="company-dot" data-id="${c.id}">
            <circle cx="${cx}" cy="${cy}" r="${r + 2}" fill="${fill}" fill-opacity="0.2"/>
            <circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}" stroke="white" stroke-width="1.5" filter="url(#dotGlow)"/>
          </g>
        `;
      }).join('');

      // 绑定事件
      document.getElementById('company-count').textContent = list.length;
      document.querySelectorAll('.district-hot').forEach(el => {
        el.addEventListener('click', () => {
          filters.district = el.dataset.id;
          districtSelect.value = filters.district;
          renderMap();
          renderDetail();
          renderDistrictsGrid();
        });
      });
      document.querySelectorAll('.company-dot').forEach(el => {
        el.addEventListener('click', () => {
          location.href = 'company.html?id=' + el.dataset.id;
        });
      });
    }

    // ---------- 渲染商区详情面板 ----------
    function renderDetail() {
      const detail = document.getElementById('detail-content');
      const badge = document.getElementById('detail-badge');
      if (!filters.district) {
        badge.textContent = '全部';
        detail.innerHTML = `
          <div class="text-sm text-soft mb-3">深圳 8 商区全景数据</div>
          <div class="grid grid-2 gap-2 text-sm">
            <div class="card-glass" style="padding: 12px;"><div class="text-xs text-muted">商区数</div><div class="text-xl font-bold num">8</div></div>
            <div class="card-glass" style="padding: 12px;"><div class="text-xs text-muted">企业总数</div><div class="text-xl font-bold num">${WB.companies().length}</div></div>
            <div class="card-glass" style="padding: 12px;"><div class="text-xs text-muted">A 类高潜</div><div class="text-xl font-bold text-primary num">${WB.companies().filter(c => c.customerLevel === 'A').length}</div></div>
            <div class="card-glass" style="padding: 12px;"><div class="text-xs text-muted">平均分</div><div class="text-xl font-bold num">${(WB.companies().reduce((s, c) => s + c.workbuddyScore, 0) / WB.companies().length).toFixed(1)}</div></div>
          </div>
        `;
        return;
      }
      const d = WB.getDistrict(filters.district);
      if (!d) return;
      badge.textContent = d.area;
      const list = WB.companiesByDistrict(filters.district).sort((a, b) => b.workbuddyScore - a.workbuddyScore);
      detail.innerHTML = `
        <div class="mb-4">
          <div class="text-xl font-bold">${d.name}</div>
          <div class="text-xs text-muted mt-1">${d.area} · ${d.type}</div>
          <div class="text-sm text-soft mt-3" style="line-height: 1.6;">${d.summary}</div>
        </div>
        <div class="grid grid-2 gap-2 text-sm mb-4">
          <div class="card-glass" style="padding: 10px;"><div class="text-xs text-muted">企业数</div><div class="font-bold num">${d.companyCount}</div></div>
          <div class="card-glass" style="padding: 10px;"><div class="text-xs text-muted">A 类</div><div class="font-bold text-primary num">${d.highScoreCount}</div></div>
          <div class="card-glass" style="padding: 10px;"><div class="text-xs text-muted">已触达</div><div class="font-bold num">${d.touchedCount}</div></div>
          <div class="card-glass" style="padding: 10px;"><div class="padding: 10px; font-bold num">${d.avgScore}</div><div class="text-xs text-muted">均分</div></div>
        </div>
        <div class="text-sm font-bold mb-2">本商区 Top 5 企业</div>
        ${list.slice(0, 5).map(c => `
          <a href="company.html?id=${c.id}" class="card card-hover" style="padding: 10px 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit;">
            <div style="flex: 1; min-width: 0;">
              <div class="text-sm font-semibold truncate">${WB.escapeHtml(c.name)}</div>
              <div class="text-xs text-muted">${c.industry} · ${WB.getStageName(c.currentStage)}</div>
            </div>
            <div class="score-A num" style="font-size: 11px; padding: 2px 8px;">${c.workbuddyScore}</div>
          </a>
        `).join('')}
        <a href="companies.html?district=${d.id}" class="btn btn-primary w-full mt-3" style="display: flex;">查看全部 ${list.length} 家企业 →</a>
      `;
    }

    // ---------- 渲染商区卡片网格 ----------
    function renderDistrictsGrid() {
      const grid = document.getElementById('districts-grid');
      grid.innerHTML = WB.districts().map(d => `
        <a href="map.html?district=${d.id}" class="card card-hover" style="padding: 16px; text-decoration: none; color: inherit; display: block;">
          <div class="flex items-center justify-between mb-2">
            <div class="font-bold">${d.name}</div>
            <span class="badge ${d.priority === 'A' ? 'badge-primary' : 'badge-neutral'}">${d.priority}</span>
          </div>
          <div class="text-xs text-muted mb-3">${d.area} · ${d.type}</div>
          <div class="grid grid-3 gap-2 text-center" style="margin-top: 12px;">
            <div><div class="text-lg font-bold num">${d.companyCount}</div><div class="text-xs text-muted">企业</div></div>
            <div><div class="text-lg font-bold text-primary num">${d.highScoreCount}</div><div class="text-xs text-muted">A 类</div></div>
            <div><div class="text-lg font-bold num">${d.avgScore}</div><div class="text-xs text-muted">均分</div></div>
          </div>
        </a>
      `).join('');
    }

    // ---------- 筛选事件 ----------
    document.getElementById('filter-district').addEventListener('change', e => { filters.district = e.target.value; renderMap(); renderDetail(); renderDistrictsGrid(); });
    document.getElementById('filter-industry').addEventListener('change', e => { filters.industry = e.target.value; renderMap(); });
    document.getElementById('filter-level').addEventListener('change', e => { filters.level = e.target.value; renderMap(); });
    document.getElementById('filter-stage').addEventListener('change', e => { filters.stage = e.target.value; renderMap(); });
    document.getElementById('filter-search').addEventListener('input', e => { filters.search = e.target.value; renderMap(); });
    document.getElementById('filter-a-only').addEventListener('change', e => { filters.aOnly = e.target.checked; renderMap(); });
    document.getElementById('reset-btn').addEventListener('click', () => {
      filters = { district: '', industry: '', level: '', stage: '', search: '', aOnly: false };
      districtSelect.value = ''; industrySelect.value = ''; document.getElementById('filter-level').value = '';
      document.getElementById('filter-stage').value = ''; document.getElementById('filter-search').value = '';
      document.getElementById('filter-a-only').checked = false;
      renderMap(); renderDetail(); renderDistrictsGrid();
    });

    // 初始
    renderMap();
    renderDetail();
    renderDistrictsGrid();
  </script>
</body>
</html>
