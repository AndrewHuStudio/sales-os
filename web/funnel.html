<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>销售漏斗 · WorkBuddy GeoSales OS</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%230052D9'/><stop offset='1' stop-color='%237C3AED'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23g)'/><text x='50' y='66' text-anchor='middle' fill='white' font-size='42' font-weight='800' font-family='-apple-system'>W</text></svg>" />
  <style>
    .funnel-stage {
      position: relative;
      padding: 18px 24px;
      border-radius: var(--radius-md);
      background: var(--color-bg-elevated);
      border: 1px solid var(--color-border);
      margin-bottom: 8px;
      cursor: pointer;
      transition: all var(--transition-fast);
      overflow: hidden;
    }
    .funnel-stage:hover { transform: translateX(8px); border-color: var(--color-primary); box-shadow: var(--shadow-md); }
    .funnel-stage-fill {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      background: var(--gradient-primary-soft);
      border-right: 3px solid var(--color-primary);
      z-index: 0;
    }
    .funnel-stage-content { position: relative; z-index: 1; display: flex; align-items: center; gap: 14px; }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-header">
        <div>
          <h1 class="page-title">销售漏斗</h1>
          <p class="page-subtitle">所有客户当前推进阶段 · 转化率分析 · 风险预警</p>
        </div>
        <div class="page-actions">
          <button class="btn-icon-theme mobile-menu-btn" id="mobile-menu-btn" title="菜单">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
          </button>
          <button class="btn-icon-theme" id="theme-btn" title="切换主题">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
          </button>
        </div>
      </div>

      <!-- 总览 -->
      <div class="grid grid-4 mb-6">
        <div class="stat">
          <div class="stat-label">总客户数</div>
          <div class="stat-value num" id="stat-total">0</div>
          <div class="stat-delta">目标 40</div>
        </div>
        <div class="stat">
          <div class="stat-label">推进中</div>
          <div class="stat-value num text-primary" id="stat-progress">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">已成交</div>
          <div class="stat-value num text-success" id="stat-won">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">总转化率</div>
          <div class="stat-value num text-accent" id="stat-rate">0%</div>
        </div>
      </div>

      <!-- 漏斗 -->
      <div class="grid" style="grid-template-columns: 1.2fr 1fr; gap: 20px;">
        <div class="card">
          <h3 class="section-title"><span class="section-title-bar"></span>销售阶段漏斗</h3>
          <div id="funnel" class="mt-3"></div>
        </div>

        <div>
          <!-- 各阶段客户清单 -->
          <div class="card">
            <h3 class="section-title"><span class="section-title-bar"></span><span id="stage-title">全部客户</span></h3>
            <div id="stage-companies"></div>
          </div>
        </div>
      </div>

      <!-- 风险点提示 -->
      <div class="card mt-6">
        <h3 class="section-title"><span class="section-title-bar"></span>风险点提示</h3>
        <div id="risks-list" class="flex-col gap-3"></div>
      </div>
    </main>
  </div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    WB.initShell('funnel');

    let activeStage = 'all';

    function render() {
      const all = WB.companies();
      const stagesWithCount = WB.STAGES.map(s => ({
        ...s,
        count: all.filter(c => c.currentStage === s.id).length
      })).filter(s => s.count > 0);

      const total = all.length;
      const progress = all.filter(c => !['untouched', 'won', 'lost', 'paused'].includes(c.currentStage)).length;
      const won = all.filter(c => c.currentStage === 'won').length;
      const rate = total > 0 ? (won / total * 100).toFixed(1) : 0;

      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-progress').textContent = progress;
      document.getElementById('stat-won').textContent = won;
      document.getElementById('stat-rate').textContent = rate + '%';

      // 漏斗
      const activeStages = stagesWithCount.filter(s => s.id !== 'lost' && s.id !== 'paused');
      const max = Math.max(...activeStages.map(s => s.count), 1);
      const funnelEl = document.getElementById('funnel');
      const allRow = activeStage === 'all' ? `
        <div class="funnel-stage" data-stage="all" style="border-color: var(--color-primary);">
          <div class="funnel-stage-fill" style="width: 100%; background: var(--gradient-primary); opacity: 0.1;"></div>
          <div class="funnel-stage-content">
            <div class="funnel-name" style="font-weight: 800; min-width: 100px;">全部</div>
            <div class="funnel-bar"><div class="funnel-bar-fill" style="width: 100%;"></div></div>
            <div class="funnel-count num" style="min-width: 40px; text-align: right; font-weight: 800;">${total}</div>
          </div>
        </div>
      ` : '';
      funnelEl.innerHTML = allRow + activeStages.map(s => {
        const pct = (s.count / max * 100).toFixed(1);
        const isActive = activeStage === s.id;
        return `
          <div class="funnel-stage" data-stage="${s.id}">
            <div class="funnel-stage-fill" style="width: ${pct}%; ${isActive ? 'background: var(--gradient-primary); opacity: 0.2;' : ''}"></div>
            <div class="funnel-stage-content">
              <div class="funnel-name" style="font-weight: 700; min-width: 100px; color: ${isActive ? 'var(--color-primary)' : 'inherit'};">${s.name}</div>
              <div class="funnel-bar"><div class="funnel-bar-fill" style="width: ${pct}%"></div></div>
              <div class="funnel-count num" style="min-width: 40px; text-align: right; font-weight: 800;">${s.count}</div>
              <div class="funnel-pct num" style="min-width: 50px; text-align: right;">${(s.count / total * 100).toFixed(1)}%</div>
            </div>
          </div>
        `;
      }).join('');

      // 事件
      funnelEl.querySelectorAll('.funnel-stage').forEach(el => {
        el.addEventListener('click', () => {
          activeStage = el.dataset.stage;
          render();
        });
      });

      // 阶段客户清单
      const stageTitle = document.getElementById('stage-title');
      const stageEl = document.getElementById('stage-companies');
      const filtered = activeStage === 'all' ? all : all.filter(c => c.currentStage === activeStage);
      stageTitle.textContent = activeStage === 'all' ? '全部客户' : WB.getStageName(activeStage) + ' 客户';
      if (filtered.length === 0) {
        stageEl.innerHTML = '<div class="empty"><div class="text-sm">该阶段暂无客户</div></div>';
      } else {
        stageEl.innerHTML = filtered.sort((a, b) => b.workbuddyScore - a.workbuddyScore).map(c => `
          <a href="company.html?id=${c.id}" class="card card-hover" style="padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit;">
            <div style="width: 36px; height: 36px; border-radius: 8px; background: var(--gradient-primary-soft); color: var(--color-primary); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; flex-shrink: 0;">${c.name.charAt(0)}</div>
            <div style="flex: 1; min-width: 0;">
              <div class="font-semibold truncate">${WB.escapeHtml(c.name)}</div>
              <div class="text-xs text-muted">${c.industry} · ${WB.getDistrictName(c.districtId)}</div>
            </div>
            <div class="text-right">
              <div class="font-bold num text-primary">${c.workbuddyScore}</div>
              <div class="text-xs text-muted">${WB.relativeDate(c.nextFollowupDate)}</div>
            </div>
          </a>
        `).join('');
      }

      // 风险点
      const risks = [];
      const noTouchLong = all.filter(c => c.currentStage === 'untouched').length;
      if (noTouchLong > 5) risks.push({ level: 'high', icon: '🚨', text: `<strong>${noTouchLong} 家</strong>企业尚未触达，建议本周安排批量触达` });

      const stalled = all.filter(c => {
        if (!['demoed', 'poc', 'pricing'].includes(c.currentStage)) return false;
        if (!c.nextFollowupDate) return true;
        return new Date(c.nextFollowupDate) < new Date();
      });
      if (stalled.length > 0) risks.push({ level: 'med', icon: '⚠️', text: `<strong>${stalled.length} 家</strong>POC/商务阶段客户已超期未跟进，需立即激活` });

      const highScoreUntouched = all.filter(c => c.workbuddyScore >= 80 && c.currentStage === 'untouched');
      if (highScoreUntouched.length > 0) risks.push({ level: 'high', icon: '💎', text: `<strong>${highScoreUntouched.length} 家 A 类</strong>高潜客户还未启动，建议优先攻克` });

      const paused = all.filter(c => c.currentStage === 'paused').length;
      if (paused > 0) risks.push({ level: 'low', icon: '⏸', text: `<strong>${paused} 家</strong>客户被暂缓，建议每月复盘是否有重新激活机会` });

      document.getElementById('risks-list').innerHTML = risks.length === 0
        ? '<div class="text-sm text-soft">✓ 当前无明显风险点</div>'
        : risks.map(r => `
          <div class="card-glass" style="padding: 12px 16px; border-left: 4px solid ${r.level === 'high' ? 'var(--color-danger)' : r.level === 'med' ? 'var(--color-warning)' : 'var(--color-info)'};">
            <div class="text-sm">${r.icon} ${r.text}</div>
          </div>
        `).join('');
    }

    render();
  </script>
</body>
</html>
